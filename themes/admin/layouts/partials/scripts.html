<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Rotate chevrons on infra panel collapse toggle
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('#infraPanel .collapse').forEach(el => {
      const header = el.previousElementSibling;
      const chevron = header && header.querySelector('.infra-chevron');
      if (!chevron) return;
      el.addEventListener('hide.bs.collapse', () => chevron.style.transform = 'rotate(-90deg)');
      el.addEventListener('show.bs.collapse', () => chevron.style.transform = '');
    });
  });
</script>
