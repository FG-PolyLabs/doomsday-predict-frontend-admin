{{ define "main" }}
<div class="d-flex align-items-center justify-content-between mb-4">
  <h2 class="h5 mb-0 fw-semibold">{{ .Title }}</h2>
  <div class="d-flex gap-2">
    <button class="btn btn-outline-secondary btn-sm" onclick="triggerSync(this)">
      <i class="bi bi-arrow-repeat me-1"></i>Sync
    </button>
    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#itemModal" onclick="openCreateModal()">
      <i class="bi bi-plus-lg me-1"></i>New Transaction
    </button>
  </div>
</div>

<!-- Auth guard banner -->
<div id="auth-guard" class="alert alert-warning d-none">
  <i class="bi bi-lock me-1"></i>You must be <a href="{{ "" | relURL }}">signed in</a> to manage transactions.
</div>

<!-- Loading state -->
<div id="loading" class="text-center py-5">
  <div class="spinner-border text-primary" role="status"></div>
</div>

<!-- Empty state -->
<div id="empty-state" class="text-center py-5 d-none">
  <i class="bi bi-inbox fs-1 text-muted"></i>
  <p class="text-muted mt-2">No transactions yet. Add your first one!</p>
</div>

<!-- Items table -->
<div class="card shadow-sm border-0 d-none" id="items-card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-3">Card</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Platform</th>
            <th>Notes</th>
            <th class="text-end pe-3">Actions</th>
          </tr>
        </thead>
        <tbody id="items-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Create / Edit Modal -->
<div class="modal fade" id="itemModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title" id="modal-title">New Transaction</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="item-id">
        <div class="mb-3">
          <label class="form-label small fw-medium" for="card-name">Card Name</label>
          <input type="text" class="form-control" id="card-name" name="card_name" placeholder="Card name" required>
        </div>
        <div class="row g-3 mb-3">
          <div class="col">
            <label class="form-label small fw-medium" for="price">Price</label>
            <input type="number" class="form-control" id="price" name="price" placeholder="0.00" step="0.01" min="0">
          </div>
          <div class="col">
            <label class="form-label small fw-medium" for="quantity">Quantity</label>
            <input type="number" class="form-control" id="quantity" name="quantity" placeholder="1" min="1">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-medium" for="platform">Platform</label>
          <select class="form-select" id="platform" name="platform">
            <option value=""></option>
            <option value="TCGPlayer">TCGPlayer</option>
            <option value="eBay">eBay</option>
            <option value="LGS">LGS</option>
            <option value="Trade">Trade</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-medium" for="notes">Notes</label>
          <textarea class="form-control" id="notes" name="notes" rows="2" placeholder="Notes (optional)"></textarea>
        </div>
        <div id="modal-error" class="alert alert-danger py-2 small d-none"></div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary btn-sm" id="modal-save-btn" onclick="saveItem()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete confirm modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content border-0 shadow">
      <div class="modal-body text-center pt-4">
        <i class="bi bi-trash3 fs-2 text-danger"></i>
        <p class="mt-2 mb-1 fw-medium">Delete this transaction?</p>
        <p class="text-muted small">This cannot be undone.</p>
      </div>
      <div class="modal-footer border-0 justify-content-center pt-0 pb-3">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger btn-sm" id="confirm-delete-btn">Delete</button>
      </div>
    </div>
  </div>
</div>
{{ end }}

{{ define "page-scripts" }}
<script>
  const RESOURCE_PATH = '/transactions';

  const itemModal   = new bootstrap.Modal(document.getElementById('itemModal'));
  const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));

  firebase.auth().onAuthStateChanged(async user => {
    if (!user) {
      document.getElementById('loading').classList.add('d-none');
      document.getElementById('auth-guard').classList.remove('d-none');
      return;
    }
    await loadItems();
  });

  async function loadItems() {
    try {
      const items = await api('GET', RESOURCE_PATH);
      document.getElementById('loading').classList.add('d-none');
      if (!items || items.length === 0) {
        document.getElementById('empty-state').classList.remove('d-none');
        return;
      }
      renderItems(items);
      document.getElementById('items-card').classList.remove('d-none');
    } catch (e) {
      document.getElementById('loading').classList.add('d-none');
      showToast('Failed to load transactions: ' + e.message, 'danger');
    }
  }

  function renderItems(items) {
    const tbody = document.getElementById('items-tbody');
    tbody.innerHTML = items.map(item => `
      <tr>
        <td class="ps-3 fw-medium">${escHtml(item.card_name || item.name || '—')}</td>
        <td>${item.price != null ? escHtml(String(item.price)) : '—'}</td>
        <td>${item.quantity != null ? escHtml(String(item.quantity)) : '—'}</td>
        <td>${escHtml(item.platform || '—')}</td>
        <td class="text-muted">${escHtml(item.notes || '—')}</td>
        <td class="text-end pe-3">
          <button class="btn btn-sm btn-outline-secondary me-1" onclick='openEditModal(${JSON.stringify(item)})'>
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal('${item.id}')">
            <i class="bi bi-trash3"></i>
          </button>
        </td>
      </tr>
    `).join('');
  }

  function openCreateModal() {
    document.getElementById('modal-title').textContent = 'New Transaction';
    document.getElementById('item-id').value = '';
    document.getElementById('card-name').value = '';
    document.getElementById('price').value = '';
    document.getElementById('quantity').value = '';
    document.getElementById('platform').value = '';
    document.getElementById('notes').value = '';
    document.getElementById('modal-error').classList.add('d-none');
  }

  function openEditModal(item) {
    document.getElementById('modal-title').textContent = 'Edit Transaction';
    document.getElementById('item-id').value = item.id;
    document.getElementById('card-name').value = item.card_name || item.name || '';
    document.getElementById('price').value = item.price != null ? item.price : '';
    document.getElementById('quantity').value = item.quantity != null ? item.quantity : '';
    document.getElementById('platform').value = item.platform || '';
    document.getElementById('notes').value = item.notes || '';
    document.getElementById('modal-error').classList.add('d-none');
    itemModal.show();
  }

  async function saveItem() {
    const id       = document.getElementById('item-id').value;
    const cardName = document.getElementById('card-name').value.trim();
    const price    = document.getElementById('price').value;
    const quantity = document.getElementById('quantity').value;
    const platform = document.getElementById('platform').value;
    const notes    = document.getElementById('notes').value.trim();
    const errEl    = document.getElementById('modal-error');
    errEl.classList.add('d-none');

    if (!cardName) {
      errEl.textContent = 'Card name is required.';
      errEl.classList.remove('d-none');
      return;
    }

    const body = {
      card_name: cardName,
      price:     price !== '' ? parseFloat(price) : null,
      quantity:  quantity !== '' ? parseInt(quantity, 10) : null,
      platform:  platform || null,
      notes:     notes || null,
    };

    const btn = document.getElementById('modal-save-btn');
    btn.disabled = true;
    try {
      if (id) {
        await api('PUT', `${RESOURCE_PATH}/${id}`, body);
      } else {
        await api('POST', RESOURCE_PATH, body);
      }
      itemModal.hide();
      await loadItems();
      document.getElementById('empty-state').classList.add('d-none');
      document.getElementById('items-card').classList.remove('d-none');
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.remove('d-none');
    } finally {
      btn.disabled = false;
    }
  }

  let pendingDeleteId = null;

  function openDeleteModal(id) {
    pendingDeleteId = id;
    deleteModal.show();
  }

  document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
    if (!pendingDeleteId) return;
    try {
      await api('DELETE', `${RESOURCE_PATH}/${pendingDeleteId}`);
      deleteModal.hide();
      await loadItems();
    } catch (e) {
      showToast('Delete failed: ' + e.message, 'danger');
    }
  });

  async function triggerSync(btn) {
    btn.disabled = true;
    const icon = btn.querySelector('i');
    if (icon) icon.classList.add('spin');
    try {
      await api('POST', `${RESOURCE_PATH}/sync`);
      showToast('Sync triggered successfully.', 'success');
      await loadItems();
    } catch (e) {
      showToast('Sync failed: ' + e.message, 'danger');
    } finally {
      btn.disabled = false;
      if (icon) icon.classList.remove('spin');
    }
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }
</script>
<style>
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
</style>
{{ end }}
